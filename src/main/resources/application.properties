spring.application.name=smart-inventory-management-system

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_inventory}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

logging.level.root=INFO
logging.level.com.example.smartinventory=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO

jwt.secret=${JWT_SECRET:change-this-super-secret-key-min-256-bits-long-for-hs256}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
