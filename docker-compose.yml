services:
  db:
    image: postgres:15-alpine
    container_name: smart-inventory-db
    environment:
      POSTGRES_DB: smart_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-inventory-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smart_inventory
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-jwt-token-secret-must-be-very-long-for-hs256-signature-algorithm-validation
      JWT_EXPIRATION_MS: 86400000

volumes:
  postgres_data:
